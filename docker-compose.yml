# Run on the Hostinger VPS:
#   docker compose pull && docker compose up -d
#
# Persists per-room JSON in the named volume so image updates don't wipe
# in-progress tournaments.

services:
  feedin:
    image: ghcr.io/dzuy4bigsea/social-tennis-organizer:latest
    container_name: feedin
    restart: unless-stopped
    ports:
      # Host port 8088 → container port 80. Change the host side if it
      # collides with another container, or remove this block entirely
      # and rely on labels below if the reverse proxy handles routing.
      - "8088:80"
    volumes:
      - feedin-data:/var/www/html/feedin/tennis-data
    # Join the same docker network as the front-end nginx reverse proxy so
    # `proxy_pass http://feedin;` resolves. Recreating the container (e.g.
    # `docker compose pull && up -d`) keeps the attachment, which a manual
    # `docker network connect` would not.
    networks:
      - default
      - reverse_proxy

    # If your reverse proxy is Traefik, uncomment these labels and replace
    # the host rule with your actual domain. Otherwise add the container to
    # whatever proxy network you already use (nginx-proxy, Caddy, etc.).
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.feedin.rule=Host(`tennis.example.com`)"
    #   - "traefik.http.routers.feedin.entrypoints=websecure"
    #   - "traefik.http.routers.feedin.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.feedin.loadbalancer.server.port=80"

volumes:
  feedin-data:

networks:
  # The default per-project bridge — keeps the feedin container in its own
  # private namespace too, useful if we add a sidecar later.
  default:
  # Pre-existing network that the front-end nginx container is on. Marking
  # it `external: true` tells compose "attach to it, don't try to create it".
  # If your nginx isn't on `claude-sync_default`, change `name:` accordingly.
  reverse_proxy:
    external: true
    name: claude-sync_default
