server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;

  # Vite was built with base='/feedin/' so the bundle's asset URLs all
  # look like /feedin/app-[hash].js. Redirect the bare root to /feedin/
  # for the same convenience the old Apache config provided.
  location = / {
    return 301 /feedin/;
  }
  location = /feedin {
    return 301 /feedin/;
  }

  # Long-cache the content-hashed bundle assets. The hash in the
  # filename is the cache-buster, so we can serve these immutable.
  location ~* /feedin/.*\.(?:js|css|woff2?|ttf|otf|png|jpe?g|svg|gif|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Everything else under /feedin/ falls back to index.html so a
  # refresh on a #room=ABC123 deep link still resolves to the SPA.
  # The HTML stays short-cached so a redeploy is reflected on the
  # next page load (the script tag will reference a new hashed bundle).
  location /feedin/ {
    try_files $uri $uri/ /feedin/index.html;
    add_header Cache-Control "no-cache";
  }
}
